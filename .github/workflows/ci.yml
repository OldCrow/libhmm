name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC / Release
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            msvc: false

          - name: Linux / Clang / Release
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            msvc: false

          - name: macOS / AppleClang / Release
            os: macos-latest
            cc: clang
            cxx: clang++
            msvc: false

          - name: Windows / MSVC / Release
            os: windows-latest
            msvc: true

    steps:
    - uses: actions/checkout@v4

    # -------------------------------------------------------------------------
    # Toolchain setup
    # -------------------------------------------------------------------------
    - name: Activate MSVC toolchain (Windows)
      if: matrix.msvc
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set compiler environment (Unix)
      if: ${{ !matrix.msvc }}
      run: |
        echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
        echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

    # -------------------------------------------------------------------------
    # Configure
    # GTest is pulled via FetchContent if not found locally (see tests/CMakeLists.txt).
    # BUILD_SHARED_LIBS=OFF avoids DLL path issues on Windows.
    # -------------------------------------------------------------------------
    - name: Configure (Windows / MSVC)
      if: matrix.msvc
      run: |
        cmake -B build `
          -G "Ninja" `
          -DCMAKE_C_COMPILER=cl `
          -DCMAKE_CXX_COMPILER=cl `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_EXAMPLES=OFF `
          -DBUILD_TOOLS=OFF `
          -DCMAKE_BUILD_TYPE=Release

    - name: Configure (Unix)
      if: ${{ !matrix.msvc }}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF

    # -------------------------------------------------------------------------
    # Build
    # -------------------------------------------------------------------------
    - name: Build all targets
      run: cmake --build build --config Release --parallel

    # -------------------------------------------------------------------------
    # Test — 41/41 tests pass on all platforms
    # -------------------------------------------------------------------------
    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure --timeout 60 -LE "known_broken|benchmark"

  # ---------------------------------------------------------------------------
  # ThreadSanitizer — catches data races (e.g. concurrent cache fills).
  # Linux/GCC only: TSan on macOS/AppleClang is unreliable with system libraries.
  # -O1 keeps stack frames intact for readable reports; BUILD_TESTS=ON required.
  # ---------------------------------------------------------------------------
  tsan:
    name: ThreadSanitizer (Linux / GCC)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Configure with TSan
      run: |
        cmake -B build-tsan \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF

    - name: Build
      run: cmake --build build-tsan --parallel

    - name: Test
      run: ctest --test-dir build-tsan -C RelWithDebInfo --output-on-failure --timeout 120 -LE "known_broken|benchmark"

  # ---------------------------------------------------------------------------
  # AddressSanitizer + UndefinedBehaviorSanitizer — catches memory errors and UB.
  # Linux/GCC only: ASan on macOS requires extra setup for system libraries.
  # -O1 -fno-omit-frame-pointer preserves stack frames for readable reports.
  # ---------------------------------------------------------------------------
  asan:
    name: ASan/UBSan (Linux / GCC)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Configure with ASan/UBSan
      run: |
        cmake -B build-asan \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -g -O1 -fno-omit-frame-pointer" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF

    - name: Build
      run: cmake --build build-asan --parallel

    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ctest --test-dir build-asan -C RelWithDebInfo --output-on-failure --timeout 120 -LE "known_broken|benchmark"

  # ---------------------------------------------------------------------------
  # Quality jobs — ubuntu only; run independently of the build matrix.
  # pre-commit mirrors local hook policy. cppcheck remains a dedicated analysis step.
  # ---------------------------------------------------------------------------
  precommit:
    name: Pre-commit (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Cache pre-commit environments
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install pre-commit
      run: python -m pip install --upgrade pip pre-commit

    - name: Determine changed files
      id: changed-files
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
        fi
        HEAD_SHA="${{ github.sha }}"

        if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
          BASE_SHA="$(git rev-parse HEAD~1)"
        fi

        mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA")
        if [[ ${#changed[@]} -eq 0 ]]; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        {
          echo "has_changes=true"
          echo "files<<EOF"
          printf '%s\n' "${changed[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Run pre-commit hooks on changed files
      if: steps.changed-files.outputs.has_changes == 'true'
      shell: bash
      run: |
        mapfile -t files <<< "${{ steps.changed-files.outputs.files }}"
        pre-commit run --files "${files[@]}" --show-diff-on-failure --color=always

    - name: No changed files to check
      if: steps.changed-files.outputs.has_changes != 'true'
      run: echo "No changed files detected for pre-commit."

  lint:
    name: Cppcheck (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cppcheck

    - name: cppcheck
      run: |
        cppcheck \
          --enable=warning,style,performance \
          --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --suppress=useStlAlgorithm \
          --suppress=shadowFunction \
          --suppress=virtualCallInConstructor \
          --suppress=constParameterReference \
          --suppress=noExplicitConstructor \
          --suppress=toomanyconfigs \
          --suppress=functionStatic \
          --std=c++20 \
          -I include \
          src/
