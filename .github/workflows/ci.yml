name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC / Release
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            msvc: false

          - name: Linux / Clang / Release
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            msvc: false

          - name: macOS / AppleClang / Release
            os: macos-latest
            cc: clang
            cxx: clang++
            msvc: false

          - name: Windows / MSVC / Release
            os: windows-latest
            msvc: true

    steps:
    - uses: actions/checkout@v4

    # -------------------------------------------------------------------------
    # Toolchain setup
    # -------------------------------------------------------------------------
    - name: Activate MSVC toolchain (Windows)
      if: matrix.msvc
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set compiler environment (Unix)
      if: ${{ !matrix.msvc }}
      run: |
        echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
        echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

    # -------------------------------------------------------------------------
    # Configure
    # GTest is pulled via FetchContent if not found locally (see tests/CMakeLists.txt).
    # BUILD_SHARED_LIBS=OFF avoids DLL path issues on Windows.
    # -------------------------------------------------------------------------
    - name: Configure (Windows / MSVC)
      if: matrix.msvc
      run: |
        cmake -B build `
          -G "Visual Studio 17 2022" -A x64 `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_EXAMPLES=OFF `
          -DBUILD_TOOLS=OFF `
          -DCMAKE_BUILD_TYPE=Release

    - name: Configure (Unix)
      if: ${{ !matrix.msvc }}
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF

    # -------------------------------------------------------------------------
    # Build
    # -------------------------------------------------------------------------
    - name: Build all targets
      run: cmake --build build --config Release --parallel

    # -------------------------------------------------------------------------
    # Test — 36/36 tests pass on all platforms
    # -------------------------------------------------------------------------
    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure --timeout 60 -LE "known_broken|benchmark"
  catalina-guard:
    name: Catalina guard (configure-only)
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Catalina-safe configure should pass
      shell: bash
      run: |
        ./scripts/configure_catalina.sh build-catalina-guard-pass \
          -DBUILD_TESTS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF \
          -DBUILD_BENCHMARKS=OFF

    - name: Catalina contaminated configure should fail
      shell: bash
      run: |
        set +e
        CXXFLAGS="-isystem /usr/local/opt/llvm/include/c++/v1" \
        cmake -S . -B build-catalina-guard-fail \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
          -DBUILD_TESTS=OFF \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TOOLS=OFF \
          -DBUILD_BENCHMARKS=OFF \
          > build-catalina-guard-fail.log 2>&1
        status=$?
        set -e

        if [ "$status" -eq 0 ]; then
          echo "Expected configure to fail for Catalina Homebrew libc++ contamination."
          cat build-catalina-guard-fail.log
          exit 1
        fi

        if ! grep -Fq "Detected Homebrew LLVM/libc++ hints on macOS Catalina" build-catalina-guard-fail.log; then
          echo "Expected Catalina guard diagnostic was not found."
          cat build-catalina-guard-fail.log
          exit 1
        fi

  # ---------------------------------------------------------------------------
  # Quality jobs — ubuntu only; run independently of the build matrix.
  # pre-commit mirrors local hook policy. cppcheck remains a dedicated analysis step.
  # ---------------------------------------------------------------------------
  precommit:
    name: Pre-commit (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Cache pre-commit environments
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Install pre-commit
      run: python -m pip install --upgrade pip pre-commit

    - name: Run pre-commit hooks
      run: pre-commit run --all-files --show-diff-on-failure --color=always

  lint:
    name: Cppcheck (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends cppcheck

    - name: cppcheck
      run: |
        cppcheck \
          --enable=warning,style,performance \
          --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --suppress=useStlAlgorithm \
          --suppress=shadowFunction \
          --suppress=virtualCallInConstructor \
          --suppress=constParameterReference \
          --suppress=noExplicitConstructor \
          --suppress=toomanyconfigs \
          --std=c++20 \
          -I include \
          src/
