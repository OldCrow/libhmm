# Pre-commit hooks for libhmm.
# Install: bash scripts/setup-pre-commit.sh
# Or manually: pip install pre-commit && pre-commit install
#
# Active hooks: file hygiene, #pragma once, clang-format, cmake-format.

default_language_version:
  python: python3

repos:
  # ─── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with a newline
      - id: mixed-line-ending
        name: Normalise line endings to LF
        args: ['--fix=lf']
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-added-large-files
        name: Block large files
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: Block merge conflict markers

  # ─── C/C++ formatting ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        name: clang-format
        types_or: [c++, c]
        args: ['--style=file']

  # ─── CMake formatting ─────────────────────────────────────────────────────────
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        name: cmake-format
        args: ['--config-file=.cmake-format.yaml']

  # ─── libhmm-specific checks ──────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-pragma-once
        name: Verify #pragma once in headers
        entry: scripts/check-pragma-once.sh
        language: script
        files: \.(h|hpp|hxx)$
        pass_filenames: true

# Exclude build artifacts and vendored content
exclude: |
  (?x)^(
    build/.*|
    third_party/.*
  )$
